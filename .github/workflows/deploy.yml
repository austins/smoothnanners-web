name: Deploy

on:
    push:
        branches: [master]
        paths-ignore:
            - ".github/dependabot.yml"
            - "README.md"
            - "LICENSE"
    workflow_dispatch:

concurrency:
    group: deploy
    cancel-in-progress: true

jobs:
    analyze:
        uses: ./.github/workflows/analyze.yml
    build:
        name: Build
        needs: analyze
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3
            - name: Install & Build Astro
              uses: withastro/action@v0
    deploy:
        needs: build
        permissions:
            contents: read
            pages: write
            id-token: write
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v1
