name: Deploy

on:
    push:
        branches: [master]
        paths-ignore:
            - ".github/dependabot.yml"
            - "README.md"
            - "LICENSE"
    workflow_dispatch:

concurrency:
    group: deploy
    cancel-in-progress: true

jobs:
    analyze:
        uses: ./.github/workflows/analyze.yml
    build:
        needs: analyze
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3
            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: lts/*
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Run build
              run: npm run build
            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v1
              with:
                  path: ./build
    deploy:
        needs: build
        permissions:
            contents: read
            pages: write
            id-token: write
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v1
